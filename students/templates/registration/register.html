{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="card p-4 shadow">
      <h4 class="text-center mb-4 fw-bold"><i class="fas fa-user-plus me-2 text-danger"></i>Register</h4>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
              <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
            {% endif %}
          </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary w-100 mt-1">
          <i class="fas fa-user-check me-1"></i>Create Account
        </button>
      </form>
      <hr>
      <p class="text-center mb-0">Already have an account?
        <a href="{% url 'login' %}" class="text-danger">Login</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
